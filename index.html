<script>
let SUBJECT = "";
let BODY = "";

let emails = [];
let chunks = [];
let current = 0;

const statusEl = document.getElementById("status");
const sendBtn = document.getElementById("sendBtn");
const nextBtn = document.getElementById("nextBtn");
const chunkSizeEl = document.getElementById("chunkSize");
const manualEl = document.getElementById("manualButtons");

const previewSubjectEl = document.getElementById("previewSubject");
const previewBodyEl = document.getElementById("previewBody");

function normalizeEmails(text) {
  return text
    .split(/\r?\n/)
    .map(l => l.trim())
    .filter(Boolean)
    .filter(l => !l.startsWith("#")); // allow comments
}

function chunkArray(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

function buildMailto(bccList) {
  // BCC-only mailto
  const bcc = encodeURIComponent(bccList.join(","));
  const subject = encodeURIComponent(SUBJECT || "");
  const body = encodeURIComponent(BODY || "");
  return `mailto:?bcc=${bcc}&subject=${subject}&body=${body}`;
}

function renderPreview() {
  if (previewSubjectEl) previewSubjectEl.textContent = SUBJECT || "(empty)";
  if (previewBodyEl) previewBodyEl.textContent = BODY || "(empty)";
}

function renderManualButtons() {
  manualEl.innerHTML = "";
  chunks.forEach((chunk, idx) => {
    const a = document.createElement("a");
    a.className = "btn";
    a.href = buildMailto(chunk);
    a.textContent = `Open chunk ${idx + 1}`;
    a.style.marginRight = "8px";
    a.style.marginTop = "8px";
    manualEl.appendChild(a);
  });
}

function rebuildChunksAndUI() {
  const size = Math.max(1, parseInt(chunkSizeEl.value || "60", 10));
  chunks = chunkArray(emails, size);

  // keep current in range
  if (chunks.length === 0) current = 0;
  else current = Math.min(current, chunks.length - 1);

  // enable/disable buttons
  const ready = (emails.length > 0 && (SUBJECT.length > 0 || BODY.length > 0));
  sendBtn.disabled = !ready || chunks.length === 0;
  nextBtn.disabled = !ready || chunks.length === 0 || current >= chunks.length - 1;

  if (chunks.length === 0) {
    statusEl.textContent = "No recipients loaded. Check emails.txt.";
    manualEl.innerHTML = "";
    return;
  }

  statusEl.textContent =
    `Loaded ${emails.length} emails • Chunk size ${size} • Chunk ${current + 1}/${chunks.length} (${chunks[current].length} recipients)`;

  renderManualButtons();
}

function openCurrentChunk() {
  if (!chunks.length) return;
  window.location.href = buildMailto(chunks[current]);
  // update next button status after opening
  rebuildChunksAndUI();
}

sendBtn.addEventListener("click", openCurrentChunk);

nextBtn.addEventListener("click", () => {
  if (current < chunks.length - 1) {
    current++;
    openCurrentChunk();
  }
});

// rebuild when chunk size changes
chunkSizeEl.addEventListener("change", () => {
  current = 0;
  rebuildChunksAndUI();
});

async function loadEmails() {
  const res = await fetch("emails.txt", { cache: "no-store" });
  if (!res.ok) throw new Error("emails.txt not found or not accessible");
  const txt = await res.text();
  emails = normalizeEmails(txt);
}

async function loadMessage() {
  const res = await fetch("message.txt", { cache: "no-store" });
  if (!res.ok) throw new Error("message.txt not found or not accessible");
  const txt = await res.text();

  // Expected format:
  // SUBJECT: ...
  // (blank line optional)
  // BODY:
  // ...
  const subjectLine = txt.match(/^SUBJECT:\s*(.*)$/m);
  const bodySplit = txt.split(/^\s*BODY:\s*$/m);

  SUBJECT = subjectLine ? subjectLine[1].trim() : "";

  // everything after BODY: is body
  BODY = bodySplit.length > 1 ? bodySplit.slice(1).join("\n").trim() : "";

  renderPreview();
}

(async function init() {
  try {
    statusEl.textContent = "Loading emails.txt and message.txt …";
    await Promise.all([loadEmails(), loadMessage()]);
    rebuildChunksAndUI();
  } catch (err) {
    console.error(err);
    statusEl.textContent = `Error: ${err.message}`;
    sendBtn.disabled = true;
    nextBtn.disabled = true;
  }
})();
</script>
